services:
  app:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ];
      then npm install; fi &&
      npm run dev -- --host 0.0.0.0"

volumes:
  node_modules:
